<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% set page_label = "NIFTY by HighCo" + (" — " + store.name if store else "") + " — Promotions en cours" %}
  <title>{% block title %}{{ page_label }}{% endblock %}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ mount_prefix|default('') }}/static/favicon-nifty-32x32.png">
  <link rel="apple-touch-icon" href="{{ mount_prefix|default('') }}/static/favicon-nifty-192x192.png">
  <link rel="stylesheet" href="{{ mount_prefix|default('') }}/static/style.css">
</head>
<body>
  <header class="topbar">
    <h1>{% block header %}{{ page_label }}{% endblock %}</h1>
    {% block header_link %}<a href="{{ url_prefix|default('') }}/admin/pending">Paramètres</a>{% endblock %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    document.querySelectorAll('.admin-table thead th').forEach(th => {
      const handle = document.createElement('span');
      handle.className = 'col-resize-handle';
      th.appendChild(handle);
      handle.addEventListener('mousedown', e => {
        e.preventDefault();
        const startX = e.pageX;
        const startWidth = th.offsetWidth;
        handle.classList.add('active');
        const onMove = e2 => {
          th.style.width = Math.max(36, startWidth + (e2.pageX - startX)) + 'px';
        };
        const onUp = () => {
          handle.classList.remove('active');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });

    const lightbox = document.createElement('div');
    lightbox.className = 'lightbox';
    lightbox.innerHTML = '<img>';
    lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
    document.body.appendChild(lightbox);
    document.querySelectorAll('img.thumb').forEach(img => {
      img.addEventListener('click', e => {
        e.preventDefault();
        lightbox.querySelector('img').src = img.src;
        lightbox.classList.add('open');
      });
    });

    // Génération de code : pop-up interne (fetch + injection) plutôt qu'une
    // navigation vers une nouvelle page — plus rapide au comptoir, et un clic
    // à l'extérieur suffit à en sortir. Repli sur la navigation classique
    // (voir /generate/{id} côté serveur) si le fetch échoue ou si JS est coupé.
    const codeModal = document.createElement('div');
    codeModal.className = 'lightbox code-modal';
    document.body.appendChild(codeModal);
    codeModal.addEventListener('click', e => {
      if (e.target === codeModal) closeCodeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeCodeModal();
    });

    function closeCodeModal() {
      codeModal.classList.remove('open');
      codeModal.innerHTML = '';
    }

    async function openCodeModal(actionUrl) {
      codeModal.innerHTML = '<div class="code-card"><div class="promo-name">Génération du code…</div></div>';
      codeModal.classList.add('open');
      try {
        const resp = await fetch(actionUrl, { method: 'POST', headers: { 'X-Requested-With': 'fetch' } });
        codeModal.innerHTML = await resp.text();
      } catch (err) {
        codeModal.innerHTML = '<div class="code-card"><div class="error-box">Connexion impossible — réessayez.</div></div>';
      }
    }

    document.querySelectorAll('.tile-form').forEach(form => {
      form.addEventListener('submit', e => {
        e.preventDefault();
        openCodeModal(form.action);
      });
    });

    function legacyCopy(text, btn) {
      // navigator.clipboard exige une connexion sécurisée (HTTPS/localhost) —
      // absente ici (déploiement en HTTP simple sur le réseau Tailscale), donc
      // l'API moderne échoue silencieusement. On retombe sur la méthode
      // classique (textarea invisible + execCommand), qui marche partout.
      const helper = document.createElement('textarea');
      helper.value = text;
      helper.setAttribute('readonly', '');
      helper.style.position = 'fixed';
      helper.style.opacity = '0';
      document.body.appendChild(helper);
      helper.select();
      helper.setSelectionRange(0, text.length);
      try {
        document.execCommand('copy');
        markCopied(btn);
      } catch (err) {
        alert('Copie impossible sur cet appareil — recopiez le code à la main : ' + text);
      }
      document.body.removeChild(helper);
    }

    function markCopied(btn) {
      btn.textContent = 'Copié ✓';
      btn.classList.add('copied');
    }

    function copyCode(btn) {
      const card = btn.closest('.code-card');
      const text = card.querySelector('#code-value').innerText;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => markCopied(btn)).catch(() => legacyCopy(text, btn));
      } else {
        legacyCopy(text, btn);
      }
    }
  </script>
</body>
</html>

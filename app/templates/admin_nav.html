<nav class="admin-nav">
  <a href="{{ url_prefix|default('') }}/admin/promotions">Promotions</a>
  <a href="{{ url_prefix|default('') }}/admin/pending">En attente</a>
  <a href="{{ url_prefix|default('') }}/admin/promotions/new">+ Ajouter manuellement</a>
  <a href="{{ url_prefix|default('') }}/admin/history">Historique</a>
  <a href="{{ url_prefix|default('') }}/admin/notifications">Notifications</a>
  <a href="{{ url_prefix|default('') }}/admin/mcp">Connexion IA (MCP)</a>
  {% if store and store.code == config.DEFAULT_STORE_CODE %}
  <a href="{{ url_prefix|default('') }}/admin/affiches">Mes affiches (bêta)</a>
  {% endif %}
  {% if store and store.integration == 'erpnext' %}
  <form method="post" action="{{ url_prefix }}/admin/poll-now" class="gmail-poll-form" style="margin:0;">
    <button type="submit" class="gmail-poll-btn">Relancer l'import des mails</button>
  </form>
  {% endif %}
  <a href="{{ url_prefix|default('') }}/admin/help" class="nav-right">Aide</a>
</nav>
<script>
(function () {
  var form = document.querySelector('.gmail-poll-form');
  if (!form) return;
  form.addEventListener('submit', function () {
    var btn = form.querySelector('.gmail-poll-btn');
    if (!btn) return;
    btn.disabled = true;
    btn.classList.add('is-loading');
    btn.textContent = 'Import en cours…';
  });
})();
</script>

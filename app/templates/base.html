<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Codes promo{% endblock %} — Pharmacie</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <h1>{% block header %}Promotions en cours{% endblock %}</h1>
    {% block header_link %}<a href="/admin/pending">Paramètres</a>{% endblock %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    document.querySelectorAll('.admin-table thead th').forEach(th => {
      const handle = document.createElement('span');
      handle.className = 'col-resize-handle';
      th.appendChild(handle);
      handle.addEventListener('mousedown', e => {
        e.preventDefault();
        const startX = e.pageX;
        const startWidth = th.offsetWidth;
        handle.classList.add('active');
        const onMove = e2 => {
          th.style.width = Math.max(36, startWidth + (e2.pageX - startX)) + 'px';
        };
        const onUp = () => {
          handle.classList.remove('active');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  </script>
</body>
</html>

{% extends "base.html" %}
{% block header %}Choisissez votre mot de passe{% endblock %}
{% block header_link %}{% endblock %}
{% block content %}
<p>Point de vente : <strong>{{ store.name }}</strong> ({{ store.code }})</p>
{% if error %}<div class="error-box">{{ error }}</div>{% endif %}
<form class="stacked" method="post" action="{{ action }}">
  <label for="password">Mot de passe (8 caractères minimum)</label>
  <input type="password" id="password" name="password" minlength="8" required autofocus>

  <label for="password_confirm">Confirmez le mot de passe</label>
  <input type="password" id="password_confirm" name="password_confirm" minlength="8" required>

  <button type="submit">Valider</button>
</form>
{% endblock %}

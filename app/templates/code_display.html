{% extends "base.html" %}
{% block content %}
<div class="code-card">
  {% if promotion.logo_path %}
    <div class="visual"><img src="/media/logos/{{ promotion.logo_path }}" alt="{{ promotion.brand_name }}"></div>
  {% elif promotion.logo_url %}
    <div class="visual"><img src="{{ promotion.logo_url }}" alt="{{ promotion.brand_name }}" onerror="this.parentElement.style.display='none'"></div>
  {% endif %}
  <div class="promo-name">{{ promotion.display_name }}</div>
  {% if code %}
    <div class="code-value" id="code-value">{{ code }}</div>
    <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copier le code</button>
  {% else %}
    <div class="error-box">
      Impossible de générer le code pour l'instant.<br>
      {{ error }}
    </div>
  {% endif %}
  <div><a class="back-link" href="/">&larr; Retour à la grille</a></div>
</div>

<script>
  function markCopied() {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copié ✓';
    btn.classList.add('copied');
  }

  function legacyCopy(text) {
    // navigator.clipboard exige une connexion sécurisée (HTTPS/localhost) —
    // absente ici (déploiement en HTTP simple sur le réseau Tailscale), donc
    // l'API moderne échoue silencieusement. On retombe sur la méthode
    // classique (textarea invisible + execCommand), qui marche partout.
    const helper = document.createElement('textarea');
    helper.value = text;
    helper.setAttribute('readonly', '');
    helper.style.position = 'fixed';
    helper.style.opacity = '0';
    document.body.appendChild(helper);
    helper.select();
    helper.setSelectionRange(0, text.length);
    try {
      document.execCommand('copy');
      markCopied();
    } catch (err) {
      alert('Copie impossible sur cet appareil — recopiez le code à la main : ' + text);
    }
    document.body.removeChild(helper);
  }

  function copyCode() {
    const text = document.getElementById('code-value').innerText;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(markCopied).catch(() => legacyCopy(text));
    } else {
      legacyCopy(text);
    }
  }
</script>
{% endblock %}
